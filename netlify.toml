[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Redirect /api/chat → Netlify function
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# SPA fallback — all non-asset routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
